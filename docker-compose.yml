version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scoutmap
      POSTGRES_PASSWORD: scoutmap
      POSTGRES_DB: scoutmap
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scoutmap"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://scoutmap:scoutmap@db:5432/scoutmap
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./sample_data:/app/sample_data

volumes:
  pgdata:
