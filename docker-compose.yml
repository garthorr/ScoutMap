version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fundraiser
      POSTGRES_PASSWORD: fundraiser
      POSTGRES_DB: fundraiser
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fundraiser"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://fundraiser:fundraiser@db:5432/fundraiser
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./sample_data:/app/sample_data

volumes:
  pgdata:
