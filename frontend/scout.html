<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScoutMap — Field Entry</title>
  <style>
    :root {
      --sa-red: #CE1126;
      --sa-blue: #003F87;
      --sa-gray: #515354;
      --sa-white: #FFFFFF;
      --sa-dark-blue: #003366;
      --sa-dark-gray: #232528;
      --sa-pale-gray: #858787;
      --border: #e2e2de;
      --bg-page: #f0efeb;
      --bg-subtle: #f7f7f5;
      --radius: 8px;
      --transition: .15s ease;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: var(--bg-page);
      color: var(--sa-dark-gray);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    header {
      background: var(--sa-white);
      color: var(--sa-dark-gray);
      padding: 0 16px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 0 var(--border);
    }
    header h1 {
      font-size: 16px;
      font-weight: 700;
      color: var(--sa-dark-blue);
      letter-spacing: -.2px;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #scout-info-badge {
      font-size: 12px;
      color: var(--sa-gray);
      padding: 3px 8px;
      border-radius: 4px;
      background: var(--bg-subtle);
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #logout-btn {
      font-size: 12px;
      background: none;
      color: var(--sa-pale-gray);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
    }
    #logout-btn:hover { background: var(--bg-subtle); color: var(--sa-dark-gray); }
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 16px;
    }
    .card {
      background: var(--sa-white);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .card h2 {
      font-size: 16px;
      color: var(--sa-dark-gray);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border);
      font-weight: 700;
      letter-spacing: -.2px;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--sa-gray);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .3px;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 16px;
      background: var(--sa-white);
      -webkit-appearance: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none;
      border-color: var(--sa-blue);
      box-shadow: 0 0 0 3px rgba(0,63,135,.1);
    }
    .field textarea { height: 70px; resize: vertical; }
    #other-name-wrap { display: none; margin-top: 8px; }
    #other-name-wrap.visible { display: block; }
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: var(--sa-dark-blue);
      color: var(--sa-white);
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition);
    }
    .btn:hover { background: #002a5c; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--sa-dark-blue);
      color: var(--sa-dark-blue);
    }
    .btn-outline:hover { background: rgba(0,51,102,.05); }

    /* House list */
    .house-item {
      display: flex;
      align-items: center;
      padding: 14px 4px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      cursor: pointer;
      transition: background var(--transition);
      min-height: 52px;
    }
    .house-item:last-child { border-bottom: none; }
    .house-item:active { background: var(--bg-subtle); }
    .house-num {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--sa-dark-blue); color: var(--sa-white);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
    }
    .house-num.done { background: #059669; }
    .house-num.avoid { background: var(--sa-red); }
    .house-details { flex: 1; min-width: 0; }
    .house-addr {
      font-size: 14px; font-weight: 600; color: var(--sa-dark-gray);
      overflow-wrap: break-word; word-break: break-word;
    }
    .house-status { font-size: 12px; color: var(--sa-pale-gray); margin-top: 1px; }
    .house-arrow { color: var(--sa-pale-gray); font-size: 16px; flex-shrink: 0; }

    /* Toggle buttons */
    .toggle-group {
      display: flex; gap: 0; border-radius: 6px; overflow: hidden;
      border: 1px solid var(--border);
    }
    .toggle-btn {
      flex: 1; padding: 14px 10px; border: none; background: var(--sa-white);
      font-size: 15px; font-weight: 600; cursor: pointer; color: var(--sa-gray);
      transition: background var(--transition), color var(--transition);
      min-height: 48px;
    }
    .toggle-btn + .toggle-btn { border-left: 1px solid var(--border); }
    .toggle-btn.active-yes { background: #059669; color: var(--sa-white); }
    .toggle-btn.active-no { background: var(--sa-red); color: var(--sa-white); }

    /* Checkbox */
    .checkbox-field { display: flex; align-items: center; gap: 12px; padding: 12px 0; min-height: 48px; }
    .checkbox-field input[type="checkbox"] { width: 24px; height: 24px; accent-color: var(--sa-dark-blue); flex-shrink: 0; }
    .checkbox-field label { font-size: 15px; font-weight: 500; color: var(--sa-dark-gray); margin: 0; }

    /* Progress */
    .progress-bar { background: var(--border); border-radius: 4px; height: 6px; margin: 10px 0; overflow: hidden; }
    .progress-fill { height: 100%; background: #059669; border-radius: 4px; transition: width .3s; }
    .progress-text { font-size: 12px; color: var(--sa-pale-gray); text-align: center; }

    .screen { display: none; }
    .screen.active { display: block; }

    #donation-amount-wrap { display: none; margin-top: 10px; }
    #donation-amount-wrap.visible { display: block; }

    .btn-row { display: flex; gap: 10px; margin-top: 14px; }
    .btn-row .btn { flex: 1; }

    .error-msg { color: var(--sa-red); font-size: 13px; margin-top: 8px; font-weight: 600; }

    /* Login */
    .login-card {
      background: var(--sa-white);
      border-radius: var(--radius);
      padding: 32px 28px;
      border: 1px solid var(--border);
      text-align: center;
      max-width: 380px;
      margin: 60px auto;
    }
    .login-card h2 {
      font-size: 20px;
      border-bottom: none;
      padding-bottom: 0;
      margin-bottom: 4px;
      color: var(--sa-dark-blue);
      letter-spacing: -.3px;
    }
    .login-card .login-subtitle {
      font-size: 12px;
      color: var(--sa-pale-gray);
      margin-bottom: 20px;
      letter-spacing: .3px;
    }
    .login-switch {
      background: none;
      color: var(--sa-blue);
      border: none;
      font-size: 13px;
      margin-top: 14px;
      cursor: pointer;
      font-weight: 500;
      padding: 4px;
    }
    .login-switch:hover { text-decoration: underline; background: none; }
  </style>
</head>
<body>
  <!-- Login Overlay -->
  <div id="login-overlay" class="screen active">
    <div style="padding:0 16px;">
      <div class="login-card">
        <h2>ScoutMap</h2>
        <p class="login-subtitle">Field Entry</p>

        <!-- Scout password login (default) -->
        <div id="login-step-scout">
          <div class="field">
            <label for="login-scout-select">Your Name</label>
            <select id="login-scout-select">
              <option value="">Loading scouts...</option>
            </select>
          </div>
          <div class="field">
            <label for="login-scout-password">Password</label>
            <input id="login-scout-password" type="password" placeholder="Enter your password" autocomplete="current-password" />
          </div>
          <button class="btn" id="login-scout-btn" onclick="scoutPasswordLogin()">Sign In</button>
          <p id="login-scout-error" class="error-msg" style="display:none"></p>
          <button class="login-switch" onclick="showAdminLogin()">Admin Sign In</button>
        </div>

        <!-- Admin password login -->
        <div id="login-step-admin" style="display:none">
          <div class="field">
            <label for="login-admin-pw">Admin Password</label>
            <input id="login-admin-pw" type="password" placeholder="Enter admin password" autocomplete="current-password" />
          </div>
          <button class="btn" id="login-admin-btn" onclick="scoutAdminLogin()">Sign In</button>
          <p id="login-admin-error" class="error-msg" style="display:none"></p>
          <button class="login-switch" onclick="showScoutLogin()">Scout Sign In</button>
        </div>
      </div>
    </div>
  </div>

  <header style="display:none">
    <h1>ScoutMap</h1>
    <div class="header-right">
      <div id="scout-info-badge"></div>
      <button id="logout-btn" onclick="scoutLogout()" style="display:none">Log Out</button>
    </div>
  </header>

  <div class="container" style="display:none">
    <!-- Screen 1: Scout setup -->
    <div id="setup-screen" class="screen active">
      <div class="card">
        <h2>Scout Information</h2>
        <div class="field">
          <label for="scout-select">Your Name</label>
          <select id="scout-select">
            <option value="">Loading roster...</option>
          </select>
        </div>
        <div id="other-name-wrap">
          <div class="field">
            <label for="other-name">Enter Your Name</label>
            <input id="other-name" type="text" placeholder="First Last" autocomplete="name" />
          </div>
          <div class="field">
            <label for="other-id">Scout ID (optional)</label>
            <input id="other-id" type="text" placeholder="ID Number" autocomplete="off" />
          </div>
        </div>
      </div>
      <div class="card">
        <h2>Select Your Walk Group</h2>
        <div class="field">
          <label for="event-select">Event</label>
          <select id="event-select"><option value="">Loading...</option></select>
        </div>
        <div class="field">
          <label for="group-select">Walk Group</label>
          <select id="group-select"><option value="">Select event first</option></select>
        </div>
      </div>
      <button id="start-btn" class="btn" disabled>Start Walking</button>
      <div id="start-error" class="error-msg" style="display:none"></div>
    </div>

    <!-- Screen 2: House list -->
    <div id="house-list-screen" class="screen">
      <div class="card">
        <h2 id="group-title">Walk Group</h2>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        <div class="progress-text" id="progress-text">0 / 0 visited</div>
        <div id="house-list"></div>
      </div>
      <button class="btn btn-outline" onclick="backToSetup()" style="margin-top:10px;">Change Group</button>
    </div>

    <!-- Screen 3: House visit form (rendered dynamically) -->
    <div id="house-form-screen" class="screen">
      <div class="card">
        <h2 id="form-house-addr">123 Main St</h2>
        <div id="dynamic-form-fields"></div>
      </div>

      <div class="btn-row">
        <button class="btn btn-outline" onclick="cancelForm()">Back</button>
        <button class="btn" id="save-visit-btn" onclick="saveVisit()">Save</button>
      </div>
    </div>
  </div>

  <script src="/static/scout.js"></script>
</body>
</html>
